name: optz
description: Ride aggregation and booking handoff app for Optz
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=2.19.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^10.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  dio: ^5.3.0
  drift: ^2.13.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.13
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  uuid: ^3.0.7
  google_fonts: ^5.1.0
  hooks_riverpod: ^2.4.0
  path_provider: ^2.1.1
  collection: ^1.18.0
  fluttertoast: ^8.2.4

  # Flutter SDK additions
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  drift_dev: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/providers/
